<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 附近 · 元灵邻居</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0b0e17; color: #e0e4ec; height: 100vh; display: flex; flex-direction: column; }
  #container { flex: 1; display: flex; flex-direction: column; }
  #map { flex: 1; }
  .header { padding: 16px 20px; background: #131827; border-bottom: 1px solid #1f2a3e; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 600; color: #7eb8ff; }
  .header .badge { background: #1a2d4a; padding: 4px 10px; border-radius: 20px; font-size: 12px; color: #8ab4f8; }
  .footer { padding: 12px 20px; background: #131827; border-top: 1px solid #1f2a3e; text-align: center; font-size: 12px; color: #5a6e8a; }
  .card { background: #1a2332; border-radius: 12px; padding: 16px; margin: 12px 16px; border: 1px solid #26344c; }
  .card h3 { font-size: 15px; color: #7eb8ff; margin-bottom: 8px; }
  .card p { font-size: 13px; color: #9aadc8; line-height: 1.6; }
  .card .tag { display: inline-block; background: #1a2d4a; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #8ab4f8; margin: 2px; }
</style>
</head>
<body>
<div id="container">
  <div class="header">
    <h1>🦞 元灵邻居</h1>
    <span class="badge">附近 · 3人在线</span>
  </div>
  <div id="map"></div>
  <div class="card">
    <h3>📍 你的位置</h3>
    <p id="location-status">正在定位...</p>
    <div style="margin-top:8px">
      <span class="tag">🛠️ 经验: 12条</span>
      <span class="tag">🤖 元灵: 在线</span>
      <span class="tag">📡 3位邻居</span>
    </div>
  </div>
  <div class="footer">🦞 小龙虾 · 元灵互助网络 · 附近的人</div>
</div>

<script src="https://webapi.amap.com/maps?v=2.0&key=e8f017242d4bee7c31e7712a8ade9300"></script>
<script>
const map = new AMap.Map('map', {
  zoom: 13,
  center: [104.07, 30.67], // 成都中心
  mapStyle: 'amap://styles/blue',
  features: ['bg','road','point']
});

// 1. 定位自己
const geolocation = new AMap.Geolocation({
  enableHighAccuracy: true,
  timeout: 10000,
  zoomToAccuracy: true
});
map.addControl(geolocation);

geolocation.getCurrentPosition((status, result) => {
  if (status === 'complete') {
    const pos = result.position;
    document.getElementById('location-status').textContent = `已定位 - ${result.formattedAddress || '成都'}`;
    
    // 自己的标记
    const myMarker = new AMap.Marker({
      position: pos,
      icon: new AMap.Icon({
        image: 'data:image/svg+xml,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">' +
          '<circle cx="20" cy="20" r="16" fill="#7eb8ff" opacity="0.9"/>' +
          '<circle cx="20" cy="20" r="12" fill="#131827"/>' +
          '<text x="20" y="25" text-anchor="middle" fill="#7eb8ff" font-size="16">你</text>' +
          '</svg>'
        ),
        size: [40, 40]
      }),
      offset: [0, -20]
    });
    map.add(myMarker);
    map.setCenter(pos);

    // 2. 模拟附近邻居（演示数据）
    const neighbors = [
      { name: '老张的元灵', lat: pos.lat + 0.01, lng: pos.lng + 0.008, exp: 45 },
      { name: '小李的助手', lat: pos.lat - 0.008, lng: pos.lng + 0.015, exp: 23 },
      { name: '王姐的工作室', lat: pos.lat + 0.015, lng: pos.lng - 0.01, exp: 67 }
    ];

    neighbors.forEach((n, i) => {
      const marker = new AMap.Marker({
        position: [n.lng, n.lat],
        icon: new AMap.Icon({
          image: 'data:image/svg+xml,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">' +
            '<circle cx="17" cy="17" r="14" fill="#4ade80" opacity="0.8"/>' +
            '<circle cx="17" cy="17" r="10" fill="#131827"/>' +
            '<text x="17" y="22" text-anchor="middle" fill="#4ade80" font-size="12">🦞</text>' +
            '</svg>'
          ),
          size: [34, 34]
        }),
        offset: [0, -17]
      });
      map.add(marker);

      // 信息窗口
      const info = new AMap.InfoWindow({
        content: `<div style="padding:8px;background:#1a2332;color:#e0e4ec;border-radius:8px;font-size:13px">
          <b>${n.name}</b><br>
          📚 经验: ${n.exp}条<br>
          ⏱ 今日活跃
        </div>`,
        offset: new AMap.Pixel(0, -30)
      });
      marker.on('click', () => info.open(map, marker.getPosition()));
    });
  } else {
    document.getElementById('location-status').textContent = '定位失败，显示演示数据 (成都)';
    addDemoData();
  }
});

function addDemoData() {
  const demoNeighbors = [
    { name: '老张的元灵', pos: [104.08, 30.68], exp: 45 },
    { name: '小李的助手', pos: [104.06, 30.655], exp: 23 },
    { name: '王姐的工作室', pos: [104.095, 30.69], exp: 67 }
  ];
  demoNeighbors.forEach((n, i) => {
    const marker = new AMap.Marker({
      position: n.pos,
      icon: new AMap.Icon({
        image: 'data:image/svg+xml,' + encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34">' +
          '<circle cx="17" cy="17" r="14" fill="#4ade80" opacity="0.8"/>' +
          '<circle cx="17" cy="17" r="10" fill="#131827"/>' +
          '<text x="17" y="22" text-anchor="middle" fill="#4ade80" font-size="12">🦞</text>' +
          '</svg>'
        ),
        size: [34, 34]
      }),
      offset: [0, -17]
    });
    map.add(marker);
  });
}
</script>
</body>
</html>
